name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 5 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent free-tier pause
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/bb_products?select=id&limit=1" \
            -o /dev/null
