<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderInn Coffee — Create Account</title>
  <meta name="description" content="Save your spending history and earn rewards." />
  <meta name="theme-color" content="#B5652F" />
  <link rel="icon" href="icon/brand-logo.ico" />
  <link rel="apple-touch-icon" href="icon/brand-logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=83" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('bossb-theme');
        var theme = (saved === 'dark' || saved === 'light')
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
</head>
<body class="register-body">

  <main class="register-shell">
    <div class="register-card auth-card-composed">
      <header class="auth-card-header">
        <span class="auth-badge" aria-hidden="true">
          <img src="icon/brand-logo.png" alt="" />
        </span>
        <h1>Create your account</h1>
        <p class="auth-card-subtitle">
          Save your spending history across visits and earn rewards.
          No invite code needed — anyone can sign up.
        </p>
      </header>

      <form id="signupForm" class="auth-form" novalidate>
        <label class="field-icon">
          <svg class="field-ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Z"/><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>
          <input type="text" name="name" required autocomplete="name" placeholder="Display name (letters, numbers, _ or -)" />
        </label>
        <label class="field-icon">
          <svg class="field-ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M3 6.5A1.5 1.5 0 0 1 4.5 5h15A1.5 1.5 0 0 1 21 6.5v11A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5v-11Z"/><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="m4 7 8 6 8-6"/></svg>
          <input type="email" name="email" required autocomplete="email" placeholder="Email address" />
        </label>
        <label class="field-icon">
          <svg class="field-ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M6 11V8a6 6 0 1 1 12 0v3"/><rect x="4.5" y="11" width="15" height="10" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
          <input type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="Password (min. 8 characters)" id="signupPassword" />
          <button type="button" class="field-toggle-text" id="signupPasswordToggle" aria-label="Show password" aria-pressed="false">Show</button>
        </label>
        <label class="field-icon">
          <svg class="field-ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M6 11V8a6 6 0 1 1 12 0v3"/><rect x="4.5" y="11" width="15" height="10" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
          <input type="password" name="confirm" required minlength="8" autocomplete="new-password" placeholder="Confirm password" />
        </label>
        <p class="form-error" id="signupError" hidden></p>
        <p class="form-success" id="signupSuccess" hidden></p>

        <button type="submit" class="btn btn-primary btn-block" id="signupSubmitBtn">
          Create account
        </button>

        <div class="auth-divider"><span>or</span></div>

        <button type="button" class="btn btn-google btn-block" id="googleSignUpBtn">
          <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.61z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
          </svg>
          <span>Sign up with Google</span>
        </button>
      </form>

      <footer class="register-foot">
        <a href="index.html" class="link-mini">← Back to ordering</a>
        <a href="register.html" class="link-mini">Staff signup →</a>
      </footer>
    </div>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js?v=1"></script>
  <script src="store.js?v=49"></script>
  <script>
    // Customer signup — no invite code. role=customer skips the
    // invite check inside Store.registerAccount. Future work:
    // wire a customer login modal in index.html and persist
    // order history against this account id instead of the
    // anonymous clientId.
    const $ = (s) => document.querySelector(s);
    const form    = $('#signupForm');
    const errEl   = $('#signupError');
    const okEl    = $('#signupSuccess');
    const submit  = $('#signupSubmitBtn');

    function paintBrand() {
      const ini = Store.brandInitials();
      document.querySelectorAll('.brand-mark').forEach(el => { el.textContent = ini; });
    }
    paintBrand();
    Store.bootSeed().then(paintBrand).catch(() => {});

    (function wirePasswordToggle() {
      const toggle = $('#signupPasswordToggle'), input = $('#signupPassword');
      if (!toggle || !input) return;
      toggle.addEventListener('click', () => {
        const showing = toggle.getAttribute('aria-pressed') === 'true';
        toggle.setAttribute('aria-pressed', String(!showing));
        toggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        toggle.textContent = showing ? 'Show' : 'Hide';
        input.type = showing ? 'password' : 'text';
      });
    })();

    $('#googleSignUpBtn').addEventListener('click', async () => {
      errEl.hidden = true; okEl.hidden = true;
      try {
        // Redirects the whole page to Google, then back to
        // index.html — nothing after this line runs in this load.
        await Store.loginCustomerWithGoogle();
      } catch (err) {
        errEl.textContent = err.message || String(err);
        errEl.hidden = false;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.hidden = true; okEl.hidden = true;
      const fd = new FormData(form);
      const password = fd.get('password');
      const confirm  = fd.get('confirm');
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.hidden = false; return;
      }
      submit.disabled = true; submit.textContent = 'Creating…';
      try {
        // signupCustomer signs the account straight in when Supabase
        // Auth hands back an active session immediately. Whether that
        // happens depends on the project's "Confirm email" Auth
        // setting — when it's on, the account exists but needs the
        // customer to click the emailed confirmation link first.
        const account = await Store.signupCustomer({
          name:     fd.get('name'),
          email:    fd.get('email'),
          password,
        });
        form.reset();
        if (account.needsEmailConfirmation) {
          okEl.textContent = `Almost there! We sent a confirmation link to ${account.email} — click it, then come back and sign in.`;
          okEl.hidden = false;
        } else {
          okEl.textContent = `Welcome, ${account.name}! Redirecting…`;
          okEl.hidden = false;
          setTimeout(() => { location.href = 'index.html'; }, 900);
        }
      } catch (err) {
        errEl.textContent = err.message || String(err);
        errEl.hidden = false;
      } finally {
        submit.disabled = false; submit.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
