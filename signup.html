<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BossB Coffee Shop — Create Account</title>
  <meta name="description" content="Save your spending history and earn rewards." />
  <meta name="theme-color" content="#A0855E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=22" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('bossb-theme');
        var theme = (saved === 'dark' || saved === 'light')
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
</head>
<body class="register-body">

  <main class="register-shell">
    <div class="register-card">
      <header class="register-head">
        <span class="brand-mark lg">BB</span>
        <h1>Create your account</h1>
        <p class="muted small">
          Save your spending history across visits and earn rewards.
          No invite code needed — anyone can sign up.
        </p>
      </header>

      <form id="signupForm" class="auth-form" novalidate>
        <label>Display name
          <input type="text" name="name" required autocomplete="name" placeholder="What should we call you?" />
        </label>
        <label>Email
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        </label>
        <label>Password
          <input type="password" name="password" required minlength="8" autocomplete="new-password" />
          <small class="hint muted">At least 8 characters.</small>
        </label>
        <label>Confirm password
          <input type="password" name="confirm" required minlength="8" autocomplete="new-password" />
        </label>

        <p class="form-error" id="signupError" hidden></p>
        <p class="form-success" id="signupSuccess" hidden></p>

        <button type="submit" class="btn btn-primary btn-block" id="signupSubmitBtn">
          Create account
        </button>
      </form>

      <footer class="register-foot">
        <a href="index.html" class="link-mini">← Back to ordering</a>
        <a href="register.html" class="link-mini">Staff signup →</a>
      </footer>
    </div>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js?v=1"></script>
  <script src="store.js?v=15"></script>
  <script>
    // Customer signup — no invite code. role=customer skips the
    // invite check inside Store.registerAccount. Future work:
    // wire a customer login modal in index.html and persist
    // order history against this account id instead of the
    // anonymous clientId.
    const $ = (s) => document.querySelector(s);
    const form    = $('#signupForm');
    const errEl   = $('#signupError');
    const okEl    = $('#signupSuccess');
    const submit  = $('#signupSubmitBtn');

    Store.bootSeed().catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.hidden = true; okEl.hidden = true;
      const fd = new FormData(form);
      const password = fd.get('password');
      const confirm  = fd.get('confirm');
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.hidden = false; return;
      }
      submit.disabled = true; submit.textContent = 'Creating…';
      try {
        const account = await Store.registerAccount({
          name:     fd.get('name'),
          email:    fd.get('email'),
          password,
          role:     'customer',
        });
        okEl.textContent = `Welcome, ${account.name}! Redirecting…`;
        okEl.hidden = false;
        form.reset();
        setTimeout(() => { location.href = 'index.html'; }, 900);
      } catch (err) {
        errEl.textContent = err.message || String(err);
        errEl.hidden = false;
      } finally {
        submit.disabled = false; submit.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
